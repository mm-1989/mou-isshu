<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>もう一首 — A 案 和モダン横書き</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600&family=Klee+One:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        font-family: 'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
        background: linear-gradient(180deg, #faf7f1 0%, #f3ece0 100%);
        color: #2a2520;
        min-height: 100vh;
        line-height: 1.6;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 2.5rem 1.25rem 5rem;
      }
      header {
        text-align: center;
        margin-bottom: 2rem;
      }
      h1 {
        font-size: 1.55rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        margin: 0;
      }
      .subtitle {
        font-size: 0.78rem;
        color: #8a7c6c;
        letter-spacing: 0.1em;
        margin: 0.4rem 0 0;
      }

      .input-area {
        display: flex;
        gap: 0.5rem;
        margin: 0 0 1rem;
      }
      .input-area input {
        flex: 1;
        padding: 0.7rem 0.9rem;
        font-family: inherit;
        font-size: 0.95rem;
        background: #fffdf8;
        border: 1px solid #d9cdb5;
        border-radius: 2px;
        color: #2a2520;
      }
      .input-area input:focus {
        outline: none;
        border-color: #b59a72;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin: 0 0 1.5rem;
        min-height: 1.8rem;
      }
      .chip {
        padding: 0.32rem 0.85rem;
        font-size: 0.8rem;
        background: #fffdf8;
        border: 1px solid #d9cdb5;
        border-radius: 999px;
        color: #6e6358;
        cursor: pointer;
        font-family: inherit;
        transition: all 0.15s;
      }
      .chip.selected {
        background: #2a2520;
        color: #faf7f1;
        border-color: #2a2520;
      }
      .chip.dismissed {
        opacity: 0.4;
        text-decoration: line-through;
      }

      .compose-button {
        display: block;
        margin: 0 auto 2.5rem;
        padding: 0.85rem 2.5rem;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.25em;
        color: #faf7f1;
        background: #2a2520;
        border: none;
        border-radius: 2px;
        cursor: pointer;
        font-family: inherit;
        transition: transform 0.12s ease;
      }
      .compose-button:hover {
        transform: translateY(-1px);
      }

      .tanka-list {
        display: flex;
        flex-direction: column;
        gap: 1.75rem;
      }
      .tanka-card {
        background: #fffdf8;
        padding: 1.85rem 1.6rem 1.5rem;
        border-left: 3px solid #b59a72;
        box-shadow: 0 1px 3px rgba(60, 40, 20, 0.08);
        position: relative;
      }
      .tanka-lines {
        font-family: 'Klee One', 'Noto Serif JP', serif;
        font-size: 1.22rem;
        line-height: 2.1;
        letter-spacing: 0.06em;
        margin: 0;
        color: #2a2520;
      }
      .tanka-line {
        display: block;
      }
      .tanka-meta {
        margin-top: 1rem;
        font-size: 0.7rem;
        color: #948776;
        letter-spacing: 0.12em;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .fav-button {
        background: none;
        border: none;
        font-size: 1.2rem;
        cursor: pointer;
        color: #d9cdb5;
        padding: 0;
        transition: color 0.15s, transform 0.15s;
      }
      .fav-button:hover {
        transform: scale(1.15);
      }
      .fav-button.active {
        color: #c8543a;
      }
      nav {
        display: flex;
        justify-content: center;
        gap: 1.5rem;
        margin-bottom: 1.5rem;
      }
      nav a {
        font-size: 0.85rem;
        color: #6e6358;
        text-decoration: none;
        letter-spacing: 0.1em;
        padding-bottom: 0.25rem;
        border-bottom: 1px solid transparent;
      }
      nav a.active {
        border-bottom-color: #2a2520;
        color: #2a2520;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>もう一首</h1>
        <p class="subtitle">なんちゃって AI 短歌ジェネレーター</p>
      </header>

      <nav>
        <a href="#" class="active">詠む</a>
        <a href="#">歌集</a>
      </nav>

      <div class="input-area">
        <input
          type="text"
          placeholder="お題やキーワードを入れてみて (例: コーヒー、 春の別れ)"
          value="コーヒー 寂しい"
        />
      </div>

      <div class="chips">
        <button class="chip selected">コーヒー</button>
        <button class="chip selected">寂しさ</button>
        <button class="chip">飲み物</button>
        <button class="chip dismissed">楽しい</button>
      </div>

      <button class="compose-button">詠 む</button>

      <div class="tanka-list">
        <article class="tanka-card">
          <p class="tanka-lines">
            <span class="tanka-line">コーヒーを</span>
            <span class="tanka-line">一人で飲んで</span>
            <span class="tanka-line">寂しさの</span>
            <span class="tanka-line">街灯のもと</span>
            <span class="tanka-line">切なさ残る</span>
          </p>
          <div class="tanka-meta">
            <span>01:23:45</span>
            <button class="fav-button active" title="お気に入りに追加">♥</button>
          </div>
        </article>

        <article class="tanka-card">
          <p class="tanka-lines">
            <span class="tanka-line">春風に</span>
            <span class="tanka-line">写真を見つめて</span>
            <span class="tanka-line">懐かしさ</span>
            <span class="tanka-line">コンビニに立つ</span>
            <span class="tanka-line">君の面影</span>
          </p>
          <div class="tanka-meta">
            <span>01:24:12</span>
            <button class="fav-button" title="お気に入りに追加">♡</button>
          </div>
        </article>

        <article class="tanka-card">
          <p class="tanka-lines">
            <span class="tanka-line">終電を</span>
            <span class="tanka-line">一人で待って</span>
            <span class="tanka-line">うれしさが</span>
            <span class="tanka-line">駅のホームに</span>
            <span class="tanka-line">静かに揺れる</span>
          </p>
          <div class="tanka-meta">
            <span>01:24:58</span>
            <button class="fav-button" title="お気に入りに追加">♡</button>
          </div>
        </article>
      </div>
    </main>
  </body>
</html>
